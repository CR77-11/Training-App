<!doctype html>

<html lang="de">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Trainings-App Pro</title>

<style>

:root{

--blue:#1f4e78;

--blue2:#2f75b5;

--bg:#f5f8fb;

--card:#fff;

--text:#17324d;

--muted:#6b7c8f;

--green:#c6efce;

--yellow:#ffeb9c;

--red:#ffc7ce;

--line:#d7e3ef;

}

body{

margin:0;

background:var(--bg);

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;

color:var(--text);

}

header{

background:linear-gradient(135deg,var(--blue),var(--blue2));

color:white;

padding:20px;

text-align:center;

}

nav button{

margin:5px;

padding:10px;

border:none;

border-radius:10px;

font-weight:bold;

}

.active{background:white;color:var(--blue)}

main{padding:15px}

.card{

background:white;

padding:15px;

border-radius:15px;

margin-bottom:10px;

}

input,select,textarea{

width:100%;

padding:10px;

margin-top:5px;

margin-bottom:10px;

border-radius:10px;

border:1px solid #ccc;

}

button.primary{

background:var(--blue);

color:white;

width:100%;

padding:12px;

border-radius:12px;

border:none;

font-weight:bold;

}

.metric{

background:#eef5fb;

padding:10px;

border-radius:12px;

margin:5px;

text-align:center;

}

canvas{

width:100%;

height:250px;

background:white;

border-radius:10px;

}

</style>

</head>

<body>

<header>

<h1>Trainings-App Pro</h1>

</header>

<main>

<div class="card">

<h2>Eintrag</h2>

<input type="date" id="date">

<input type="number" id="weight" placeholder="Gewicht">

<input type="number" id="load" placeholder="Belastung (1-10)">

<input type="number" id="shoulder" placeholder="Schulter (0-5)">

<button class="primary" onclick="save()">Speichern</button>

</div>

<div class="card">

<h2>Dashboard</h2>

<div class="metric">Gewicht: <span id="cw"></span></div>

<div class="metric">Abnahme: <span id="loss"></span></div>

<div class="metric">Ø Belastung: <span id="avg"></span></div>

</div>

<div class="card">

<h2>Verlauf</h2>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h2>Einträge</h2>

<ul id="list"></ul>

</div>

</main>

<script>

let data = JSON.parse(localStorage.getItem("data")||"[]")

document.getElementById("date").value=new Date().toISOString().slice(0,10)

function save(){

let e={

date:date.value,

weight:Number(weight.value),

load:Number(load.value),

shoulder:Number(shoulder.value)

}

data.push(e)

localStorage.setItem("data",JSON.stringify(data))

render()

}

function render(){

let list=document.getElementById("list")

list.innerHTML=""

data.forEach(e=>{

list.innerHTML+="<li>"+e.date+" | "+e.weight+"kg | L:"+e.load+"</li>"

})

if(data.length){

let last=data[data.length-1]

cw.innerText=last.weight+" kg"

loss.innerText=(105-last.weight).toFixed(1)+" kg"

let avg=data.reduce((s,e)=>s+e.load,0)/data.length

avg=avg.toFixed(1)

document.getElementById("avg").innerText=avg

draw()

}

}

function draw(){

let c=document.getElementById("chart")

let ctx=c.getContext("2d")

ctx.clearRect(0,0,c.width,c.height)

ctx.beginPath()

data.forEach((e,i)=>{

let x=i*40

let y=200-e.weight

if(i==0) ctx.moveTo(x,y)

else ctx.lineTo(x,y)

})

ctx.stroke()

}

render()

</script>

</body>

</html>
