<!doctype html>

<html lang="de">

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Trainings-App Pro++</title>

<style>

:root{

  --blue:#1f4e78;

  --bg:#f4f7fb;

  --card:#ffffff;

  --line:#d7e3ef;

}

body{

  margin:0;

  font-family:-apple-system, sans-serif;

  background:var(--bg);

}

/* Header */

header{

  background:linear-gradient(135deg,#1f4e78,#2f75b5);

  color:white;

  padding:20px;

  text-align:center;

}

nav{

  display:flex;

  gap:8px;

  margin-top:10px;

  flex-wrap:wrap;

  justify-content:center;

}

nav button{

  padding:10px 14px;

  border-radius:12px;

  border:1px solid #fff5;

  background:#ffffff22;

  color:white;

  font-weight:700;

}

nav button.active{

  background:white;

  color:#1f4e78;

}

/* Layout */

main{

  max-width:900px;

  margin:auto;

  padding:16px;

}

.card{

  background:white;

  padding:16px;

  border-radius:16px;

  margin-bottom:16px;

  box-shadow:0 4px 12px #0001;

}

.grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:10px;

}

/* Inputs */

input,select{

  width:100%;

  padding:12px;

  border-radius:10px;

  border:1px solid var(--line);

  font-size:16px;

  min-height:48px;

}

/* FIX DATE FIELD */

input[type="date"]{

  appearance:none;

  -webkit-appearance:none;

  height:48px;

}

/* Buttons */

button{

  padding:12px;

  border:none;

  border-radius:12px;

  font-weight:800;

}

.primary{

  background:#1f4e78;

  color:white;

  width:100%;

}

/* Tabs */

.tab{display:none;}

.tab.active{display:block;}

canvas{

  width:100%;

  height:260px;

  border-radius:12px;

  border:1px solid var(--line);

}

</style>

</head>

<body>

<header>

<h1>Trainings-App Pro++</h1>

<nav>

<button onclick="tab('track',this)" class="active">Tracking</button>

<button onclick="tab('dash',this)">Dashboard</button>

</nav>

</header>

<main>

<!-- TRACKING -->

<div id="track" class="tab active">

<div class="card">

<h2>Eintrag</h2>

<div class="grid">

<input type="date" id="date">

<input type="number" id="weight" placeholder="Gewicht">

</div>

<button class="primary" onclick="save()">Speichern</button>

</div>

</div>

<!-- DASHBOARD -->

<div id="dash" class="tab">

<div class="card">

<h2>Gewicht</h2>

<canvas id="chart"></canvas>

</div>

</div>

</main>

<script>

const START_WEIGHT = 105;

const TARGET = 85;

const START_DATE = new Date("2026-05-03");

const KEY="data_pro";

date.value=new Date().toISOString().slice(0,10);

function tab(id,btn){

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(id).classList.add("active");

  document.querySelectorAll("nav button").forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");

  render();

}

function get(){

  return JSON.parse(localStorage.getItem(KEY)||"[]");

}

function save(){

  let data=get();

  data.push({

    date:date.value,

    weight:Number(weight.value)

  });

  data.sort((a,b)=>a.date.localeCompare(b.date));

  localStorage.setItem(KEY,JSON.stringify(data));

  render();

}

function render(){

  draw(get());

}

function draw(data){

  const c=chart;

  const ctx=c.getContext("2d");

  ctx.clearRect(0,0,c.width,c.height);

  const pad=40;

  function y(w){

    return c.height-pad - (w-80)/(110-80)*(c.height-2*pad);

  }

  function x(i){

    return pad + i*(c.width-2*pad)/Math.max(1,data.length-1);

  }

  // IST

  ctx.strokeStyle="#1f4e78";

  ctx.beginPath();

  data.forEach((e,i)=>{

    if(i===0) ctx.moveTo(x(i),y(e.weight));

    else ctx.lineTo(x(i),y(e.weight));

  });

  ctx.stroke();

  // TREND

  if(data.length>=7){

    let avg=[];

    for(let i=0;i<data.length;i++){

      let slice=data.slice(Math.max(0,i-6),i+1);

      avg.push(slice.reduce((s,e)=>s+e.weight,0)/slice.length);

    }

    ctx.strokeStyle="#2f75b5";

    ctx.beginPath();

    avg.forEach((v,i)=>{

      if(i===0) ctx.moveTo(x(i),y(v));

      else ctx.lineTo(x(i),y(v));

    });

    ctx.stroke();

    // PROGNOSE

    if(avg.length>=10){

      let last=avg.at(-1);

      let prev=avg.at(-8);

      let rate=(last-prev)/7;

      let future=last + rate*60;

      ctx.strokeStyle="orange";

      ctx.setLineDash([5,5]);

      ctx.beginPath();

      ctx.moveTo(x(data.length-1),y(last));

      ctx.lineTo(x(data.length+10),y(future));

      ctx.stroke();

      ctx.setLineDash([]);

    }

  }

  // ZIELKORRIDOR

  ctx.fillStyle="rgba(100,100,100,0.15)";

  for(let i=0;i<100;i++){

    let slow=START_WEIGHT - i*0.5/7;

    let fast=START_WEIGHT - i*0.8/7;

    ctx.fillRect(

      pad+i*5,

      y(slow),

      3,

      y(fast)-y(slow)

    );

  }

}

render();

</script>

</body>

</html>
